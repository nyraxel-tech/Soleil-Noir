name: Scrape AnimeHeaven

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install requests beautifulsoup4 --quiet

      - name: Scrape AnimeHeaven
        run: |
          python3 << 'PYEOF'
          import requests
          from bs4 import BeautifulSoup
          import json, re, os
          from datetime import datetime, timezone

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml",
              "Accept-Language": "en-US,en;q=0.9",
              "Referer": "https://animeheaven.me/",
          }

          r = requests.get("https://animeheaven.me/new.php", headers=headers, timeout=15)
          print(f"Status: {r.status_code}, Size: {len(r.text)} bytes")

          soup = BeautifulSoup(r.text, "html.parser")
          animes = []
          seen = set()
          skip = {"New","Popular","Fall","Random","MORE","POPULAR","Tools","Anime Heaven",""}
          banner_count = 0

          for a_tag in soup.find_all("a", href=lambda h: h and "/anime.php?" in h):
              img = a_tag.find("img")
              if not img:
                  continue
              titre = img.get("alt", "").strip()
              if not titre or titre in skip:
                  continue
              if any(x in titre.lower() for x in ["logo","icon","burger","prev","next","sun","discord","twitter"]):
                  continue
              href = a_tag.get("href", "")
              ah_id = href.split("?")[-1].rstrip("=")
              src = img.get("src", "")
              img_code = src.split("?")[-1] if "?" in src else ""
              if not ah_id or not img_code or ah_id in seen or len(ah_id) < 3:
                  continue
              if banner_count < 3:
                  banner_count += 1
                  seen.add(ah_id)
                  continue
              seen.add(ah_id)
              parent = a_tag.parent
              text = parent.get_text(" ", strip=True) if parent else ""
              ep_match = re.search(r'\b(\d+)\b', text)
              ep = int(ep_match.group(1)) if ep_match else 1
              time_match = re.search(r'(\d+)\s*(h|d)\s*ago', text)
              ago = f"{time_match.group(1)}{time_match.group(2)}" if time_match else "1j"
              animes.append({"titre": titre, "titreJp": "", "ep": ep, "ago": ago, "img": img_code, "ahId": ah_id})
              if len(animes) >= 80:
                  break

          print(f"Found {len(animes)} animes")

          # ── Écriture data.json ──
          with open("data.json", "w") as f:
              json.dump({"animes": animes, "updatedAt": datetime.now(timezone.utc).isoformat(), "source": "github-actions", "count": len(animes)}, f, ensure_ascii=False, indent=2)

          # ── Mise à jour cumulative de archive.json ──
          existing = []
          seen_ids = set()
          if os.path.exists("archive.json"):
              try:
                  with open("archive.json") as f:
                      d = json.load(f)
                      existing = d.get("animes", [])
                      seen_ids = {a["ahId"] for a in existing}
              except:
                  pass

          new_entries = 0
          for a in animes:
              if a["ahId"] not in seen_ids:
                  seen_ids.add(a["ahId"])
                  existing.append({
                      "titre": a["titre"],
                      "titreJp": a.get("titreJp", ""),
                      "img": a["img"],
                      "ahId": a["ahId"],
                      "addedAt": datetime.now(timezone.utc).isoformat()
                  })
                  new_entries += 1

          print(f"Archive: +{new_entries} nouveaux → {len(existing)} total")

          with open("archive.json", "w") as f:
              json.dump({"animes": existing, "updatedAt": datetime.now(timezone.utc).isoformat(), "count": len(existing)}, f, ensure_ascii=False, indent=2)

          print("data.json + archive.json written")
          PYEOF

      - name: Commit and push data.json
        run: |
          git config user.name "Soleil Noir Bot"
          git config user.email "bot@soleilnoir.app"
          git pull origin main
          git add data.json archive.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Update data + archive - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
