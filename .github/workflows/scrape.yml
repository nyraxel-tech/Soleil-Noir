name: Scrape AnimeHeaven

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scrape AnimeHeaven
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const options = {
            hostname: 'animeheaven.me',
            path: '/new.php',
            method: 'GET',
            headers: {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'text/html,application/xhtml+xml',
              'Accept-Language': 'en-US,en;q=0.9',
              'Referer': 'https://animeheaven.me/',
            }
          };

          const req = https.request(options, (res) => {
            console.log('Status:', res.statusCode);
            let html = '';
            res.on('data', chunk => html += chunk);
            res.on('end', () => {
              console.log('Size:', html.length);

              const blocks = html.split('add.svg');
              console.log('Blocks:', blocks.length);

              const animes = [];
              const seen = new Set();
              const skipTitles = new Set(['New','Popular','Fall','Random','MORE','POPULAR','Tools','Anime Heaven','','-']);

              for (let i = 1; i < blocks.length; i++) {
                const b = blocks[i];

                const idM    = b.match(/anime\.php[?='](\w+)/);
                const imgM   = b.match(/image\.php[?'](\w+)/);
                // Exact match sur charttitle c (sans jp) pour éviter de capturer charttitlejp
                const titleM = b.match(/class='charttitle c'><a[^>]+>([^<]+)<\/a>/);
                const epM    = b.match(/class='chartep[^']*'>\s*(\d+)\s*</);
                const timeM  = b.match(/(\d+)\s*(h|d)\s*ago/);

                if (!idM || !imgM) continue;

                const ahId  = idM[1];
                const img   = imgM[1];

                // Titre JP
                const jpM = b.match(/class='charttitlejp c'>([^<]+)</);
                const titreJp = jpM && jpM[1].trim() !== '-' ? jpM[1].trim() : '';

                // Titre anglais depuis le lien, fallback sur titreJp
                const rawTitre = titleM ? titleM[1].trim() : '';
                const titre = (rawTitre || titreJp)
                  .replace(/&#0*39;/g, "'").replace(/&amp;/g, '&').replace(/&quot;/g, '"');

                if (!titre || skipTitles.has(titre) || seen.has(ahId) || ahId.length < 3) continue;
                if (['logo','icon','burger','prev','next','sun','discord','twitter','banner'].some(x => titre.toLowerCase().includes(x))) continue;

                seen.add(ahId);

                animes.push({
                  titre,
                  titreJp,
                  ep: epM ? parseInt(epM[1]) : 1,
                  ago: timeM ? `${timeM[1]}${timeM[2]}` : '?',
                  img,
                  ahId,
                });
                if (animes.length >= 80) break;
              }

              console.log('Found:', animes.length);
              if (animes.length > 0) {
                console.log('First:', animes[0].titre, '| ahId:', animes[0].ahId);
                console.log('Second:', animes[1]?.titre, '| ahId:', animes[1]?.ahId);
                console.log('Last:', animes[animes.length-1].titre);
              }

              if (animes.length === 0) {
                console.log('0 animés trouvés — data.json inchangé');
                process.exit(0);
              }

              fs.writeFileSync('data.json', JSON.stringify({
                animes,
                updatedAt: new Date().toISOString(),
                source: 'github-actions',
                count: animes.length
              }, null, 2));

              let existing = [], seenIds = new Set();
              try {
                const arch = JSON.parse(fs.readFileSync('archive.json', 'utf8'));
                existing = arch.animes || [];
                seenIds = new Set(existing.map(a => a.ahId));
              } catch(e) {}

              let added = 0;
              for (const a of animes) {
                if (!seenIds.has(a.ahId)) {
                  seenIds.add(a.ahId);
                  existing.push({ titre: a.titre, titreJp: a.titreJp, img: a.img, ahId: a.ahId, addedAt: new Date().toISOString() });
                  added++;
                }
              }
              console.log(`Archive: +${added} → ${existing.length} total`);

              fs.writeFileSync('archive.json', JSON.stringify({
                animes: existing,
                updatedAt: new Date().toISOString(),
                count: existing.length
              }, null, 2));

              console.log('data.json + archive.json OK');
            });
          });
          req.on('error', e => { console.error(e.message); process.exit(1); });
          req.end();
          EOF

      - name: Commit and push
        run: |
          git config user.name "Soleil Noir Bot"
          git config user.email "bot@soleilnoir.app"
          git pull origin main
          git add data.json archive.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "🔄 Update - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
