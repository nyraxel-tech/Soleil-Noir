export const config = { maxDuration: 30 };

export default async function handler(req, res) {
  // Sécurité : vérifier que c'est Vercel qui appelle
  if (req.headers['authorization'] !== `Bearer ${process.env.CRON_SECRET}`) {
    return res.status(401).json({ error: 'Unauthorized' });
  }

  try {
    // Scrape AnimeHeaven
    const r = await fetch('https://animeheaven.me/new.php', {
      headers: {
        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36',
        'Accept': 'text/html,application/xhtml+xml',
        'Accept-Language': 'en-US,en;q=0.9',
        'Referer': 'https://animeheaven.me/',
      },
    });

    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const html = await r.text();

    // Parser add.svg
    const animes = [];
    const seen = new Set();
    const skip = new Set(['New','Popular','Fall','Random','MORE','POPULAR','Tools','Anime Heaven','']);
    const blocks = html.split('add.svg');
    let bannerCount = 0;

    for (let i = 1; i < blocks.length; i++) {
      const b = blocks[i];
      const idM   = b.match(/anime\.php[?='](\w+)/);
      const imgM  = b.match(/image\.php[?'](\w+)/);
      const altM  = b.match(/alt=['"]([^'"]+)['"]/);
      const epM   = b.match(/\n\s*(\d+)\s*\n/);
      const timeM = b.match(/(\d+)\s*(h|d)\s*ago/);

      if (!idM || !imgM || !altM) continue;

      const ahId  = idM[1];
      const img   = imgM[1];
      const titre = altM[1].trim();

      if (!titre || skip.has(titre) || seen.has(ahId) || ahId.length < 3) continue;
      if (['logo','icon','burger','prev','next','sun','discord','twitter','banner'].some(x => titre.toLowerCase().includes(x))) continue;

      if (bannerCount < 3) { bannerCount++; seen.add(ahId); continue; }

      seen.add(ahId);
      const jpM = b.match(/class='charttitlejp c'>([^<]+)</);
      const titreJp = jpM && jpM[1].trim() !== '-' ? jpM[1].trim() : '';

      animes.push({
        titre, titreJp,
        ep: epM ? parseInt(epM[1]) : 1,
        ago: timeM ? `${timeM[1]}${timeM[2]}` : '?',
        img, ahId,
      });
      if (animes.length >= 80) break;
    }

    // Push vers GitHub pour mettre à jour data.json
    const data = {
      animes,
      updatedAt: new Date().toISOString(),
      source: 'vercel-cron',
      count: animes.length,
    };

    const ghRes = await fetch(
      `https://api.github.com/repos/${process.env.GITHUB_REPO}/contents/data.json`,
      {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          message: `🔄 Update data - ${new Date().toISOString()}`,
          content: Buffer.from(JSON.stringify(data, null, 2)).toString('base64'),
          sha: await getFileSha(process.env.GITHUB_REPO, process.env.GITHUB_TOKEN),
        }),
      }
    );

    if (!ghRes.ok) {
      const err = await ghRes.text();
      throw new Error(`GitHub push failed: ${err}`);
    }

    return res.status(200).json({ success: true, count: animes.length, updatedAt: data.updatedAt });

  } catch (err) {
    console.error('Cron error:', err.message);
    return res.status(500).json({ error: err.message });
  }
}

async function getFileSha(repo, token) {
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
    headers: { 'Authorization': `Bearer ${token}` },
  });
  if (!r.ok) return undefined;
  const d = await r.json();
  return d.sha;
}
