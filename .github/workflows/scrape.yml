name: Scrape AnimeHeaven

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scrape AnimeHeaven
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const options = {
            hostname: 'animeheaven.me',
            path: '/new.php',
            method: 'GET',
            headers: {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
              'Accept-Language': 'en-US,en;q=0.9',
              'Referer': 'https://animeheaven.me/',
            }
          };

          const req = https.request(options, (res) => {
            console.log('Status:', res.statusCode);
            let html = '';
            res.on('data', chunk => html += chunk);
            res.on('end', () => {
              console.log('Size:', html.length, 'bytes');

              const animes = [];
              const seen = new Set();
              const skip = new Set(['New','Popular','Fall','Random','MORE','POPULAR','Tools','Anime Heaven','']);

              // Split sur add.svg — méthode fiable basée sur la structure réelle
              const blocks = html.split('add.svg');
              console.log('Blocks found:', blocks.length);

              let bannerCount = 0;

              for (let i = 1; i < blocks.length; i++) {
                const block = blocks[i];

                // ahId
                const idMatch = block.match(/anime\.php\?(\w+)/);
                // image code
                const imgMatch = block.match(/image\.php\?(\w+)/);
                // titre depuis alt=""
                const altMatch = block.match(/alt="([^"]+)"/);
                // épisode — nombre seul sur une ligne
                const epMatch = block.match(/\n\s*(\d+)\s*\n/);
                // temps
                const timeMatch = block.match(/(\d+)\s*(h|d)\s*ago/);

                if (!idMatch || !imgMatch || !altMatch) continue;

                const ahId = idMatch[1];
                const img = imgMatch[1];
                const titre = altMatch[1].trim();

                if (!titre || skip.has(titre) || seen.has(ahId) || ahId.length < 3) continue;
                if (['logo','icon','burger','prev','next','sun','discord','twitter','banner']
                    .some(x => titre.toLowerCase().includes(x))) continue;

                // Skip 3 premières = bannières pub
                if (bannerCount < 3) {
                  bannerCount++;
                  seen.add(ahId);
                  continue;
                }

                seen.add(ahId);

                // Titre JP — ligne après le lien titre
                const jpMatch = block.match(/\[([^\]]+)\]\(https:\/\/animeheaven\.me\/anime\.php\?\w+\)\s*\n\s*\n([^\n]+)\n/);
                const titreJp = jpMatch && jpMatch[2] !== '-' ? jpMatch[2].trim() : '';

                animes.push({
                  titre,
                  titreJp,
                  ep: epMatch ? parseInt(epMatch[1]) : 1,
                  ago: timeMatch ? `${timeMatch[1]}${timeMatch[2]}` : '?',
                  img,
                  ahId,
                });

                if (animes.length >= 80) break;
              }

              console.log('Found:', animes.length, 'animes');
              if (animes.length > 0) {
                console.log('First:', animes[0].titre);
                console.log('Last:', animes[animes.length-1].titre);
              }

              // Écriture data.json
              const data = {
                animes,
                updatedAt: new Date().toISOString(),
                source: 'github-actions',
                count: animes.length,
              };
              fs.writeFileSync('data.json', JSON.stringify(data, null, 2));

              // Accumulation archive.json
              let existing = [];
              let seenIds = new Set();
              try {
                const arch = JSON.parse(fs.readFileSync('archive.json', 'utf8'));
                existing = arch.animes || [];
                seenIds = new Set(existing.map(a => a.ahId));
              } catch(e) {}

              let newEntries = 0;
              for (const a of animes) {
                if (!seenIds.has(a.ahId)) {
                  seenIds.add(a.ahId);
                  existing.push({
                    titre: a.titre,
                    titreJp: a.titreJp,
                    img: a.img,
                    ahId: a.ahId,
                    addedAt: new Date().toISOString(),
                  });
                  newEntries++;
                }
              }

              console.log(`Archive: +${newEntries} → ${existing.length} total`);
              fs.writeFileSync('archive.json', JSON.stringify({
                animes: existing,
                updatedAt: new Date().toISOString(),
                count: existing.length,
              }, null, 2));

              console.log('data.json + archive.json OK');
            });
          });

          req.on('error', e => { console.error('Error:', e.message); process.exit(1); });
          req.end();
          EOF

      - name: Commit and push
        run: |
          git config user.name "Soleil Noir Bot"
          git config user.email "bot@soleilnoir.app"
          git pull origin main
          git add data.json archive.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "🔄 Update data + archive - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
