name: Scrape AnimeHeaven

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Scrape AnimeHeaven
        run: |
          python3 << 'PYEOF'
          import requests
          import json, re, os
          from datetime import datetime, timezone

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml",
              "Accept-Language": "en-US,en;q=0.9",
              "Referer": "https://animeheaven.me/",
          }

          r = requests.get("https://animeheaven.me/new.php", headers=headers, timeout=15)
          print(f"Status: {r.status_code}, Size: {len(r.text)} bytes")
          html = r.text

          animes = []
          seen = set()
          banner_count = 0

          # Parser basé sur la structure div CSS
          # Split sur les blocs chart (guillemets simples ou doubles)
          blocks = re.split(r'class=["\']chart [bc]["\']', html)
          print(f"Blocks found: {len(blocks)}")

          # Debug block 4
          if len(blocks) > 4:
              print(f"Block 4: {repr(blocks[4][:400])}")

          skip_titles = {"New","Popular","Fall","Random","MORE","POPULAR","Tools","Anime Heaven",""}

          for block in blocks[1:]:
              # Titre — guillemets simples ou doubles
              title_match = re.search(r"""class=["']charttitle c["']><a href=["']anime\.php\?(\w+)["'][^>]*>([^<]+)<""", block)
              if not title_match:
                  # Try alternative pattern
                  title_match = re.search(r"""href=["']anime\.php\?(\w+)["'][^>]*>([^<]+)<""", block)
              if not title_match:
                  continue

              ah_id = title_match.group(1)
              titre = title_match.group(2).strip()

              if not titre or titre in skip_titles or ah_id in seen or len(ah_id) < 3:
                  continue

              img_match = re.search(r"image\.php\?(\w+)", block)
              if not img_match:
                  continue
              img = img_match.group(1)

              jp_match = re.search(r"""class=["']charttitlejp c["']>([^<]+)<""", block)
              titre_jp = jp_match.group(1).strip() if jp_match and jp_match.group(1) != "-" else ""

              ep_match = re.search(r"""class=["']chartep c2["']>(\d+)<""", block)
              ep = int(ep_match.group(1)) if ep_match else 1

              time_match = re.search(r"""class=["']charttimer c2["']>(\d+)\s*(h|d)\s*ago<""", block)
              if not time_match:
                  time_match = re.search(r'(\d+)\s*(h|d)\s*ago', block)
              ago = f"{time_match.group(1)}{time_match.group(2)}" if time_match else "?"

              if banner_count < 3:
                  banner_count += 1
                  seen.add(ah_id)
                  continue

              seen.add(ah_id)
              animes.append({"titre": titre, "titreJp": titre_jp, "ep": ep, "ago": ago, "img": img, "ahId": ah_id})

              if len(animes) >= 80:
                  break

          print(f"Found {len(animes)} animes")
          if animes:
              print(f"First: {animes[0]['titre']}")
              print(f"Last:  {animes[-1]['titre']}")

          # Écriture data.json
          with open("data.json", "w") as f:
              json.dump({
                  "animes": animes,
                  "updatedAt": datetime.now(timezone.utc).isoformat(),
                  "source": "github-actions",
                  "count": len(animes)
              }, f, ensure_ascii=False, indent=2)

          # Accumulation archive.json
          existing = []
          seen_ids = set()
          if os.path.exists("archive.json"):
              try:
                  with open("archive.json") as f:
                      d = json.load(f)
                      existing = d.get("animes", [])
                      seen_ids = {a["ahId"] for a in existing}
              except:
                  pass

          new_entries = 0
          for a in animes:
              if a["ahId"] not in seen_ids:
                  seen_ids.add(a["ahId"])
                  existing.append({
                      "titre": a["titre"],
                      "titreJp": a.get("titreJp", ""),
                      "img": a["img"],
                      "ahId": a["ahId"],
                      "addedAt": datetime.now(timezone.utc).isoformat()
                  })
                  new_entries += 1

          print(f"Archive: +{new_entries} → {len(existing)} total")

          with open("archive.json", "w") as f:
              json.dump({
                  "animes": existing,
                  "updatedAt": datetime.now(timezone.utc).isoformat(),
                  "count": len(existing)
              }, f, ensure_ascii=False, indent=2)

          print("data.json + archive.json OK")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "Soleil Noir Bot"
          git config user.email "bot@soleilnoir.app"
          git pull origin main
          git add data.json archive.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "🔄 Update data + archive - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
