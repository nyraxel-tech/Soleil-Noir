name: Scrape AnimeHeaven Archive

on:
  schedule:
    - cron: '0 3 1 * *'  # Déclenché le 1er du mois (accumulation via scrape.yml)
  workflow_dispatch:

concurrency:
  group: scrape-archive
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install requests beautifulsoup4 --quiet

      - name: Rebuild archive from accumulated data
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone

          # Charge l'archive existante
          existing = []
          seen_ids = set()
          if os.path.exists("archive.json"):
              try:
                  with open("archive.json") as f:
                      d = json.load(f)
                      existing = d.get("animes", [])
                      seen_ids = {a["ahId"] for a in existing}
                  print(f"Archive existante: {len(existing)} animes")
              except:
                  print("Archive vide ou corrompue, on repart de zéro")

          # Charge les données live de data.json (scraped par scrape.yml)
          new_entries = 0
          if os.path.exists("data.json"):
              try:
                  with open("data.json") as f:
                      d = json.load(f)
                      for a in d.get("animes", []):
                          if a["ahId"] not in seen_ids:
                              seen_ids.add(a["ahId"])
                              existing.append({
                                  "titre": a["titre"],
                                  "titreJp": a.get("titreJp", ""),
                                  "img": a["img"],
                                  "ahId": a["ahId"],
                                  "addedAt": datetime.now(timezone.utc).isoformat()
                              })
                              new_entries += 1
              except Exception as e:
                  print(f"Erreur data.json: {e}")

          print(f"Nouveaux ajouts: {new_entries}")
          print(f"Total archive: {len(existing)}")

          out = {
              "animes": existing,
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "count": len(existing),
          }
          with open("archive.json", "w") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
          print("archive.json written")
          PYEOF

      - name: Commit and push archive.json
        run: |
          git config user.name "Soleil Noir Bot"
          git config user.email "bot@soleilnoir.app"
          git pull origin main
          git add archive.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📚 Update archive - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
