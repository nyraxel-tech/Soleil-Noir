<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06070d">
<title>Soleil Noir</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #080a08;
  --surface: rgba(212,185,130,.04);
  --border: rgba(212,185,130,.12);
  --text: #e8dfc4;
  --muted: #7a7060;
  --accent: #d4b97a;
  --accent-d: #a8893a;
  --green: #8fbf8f;
  --yellow: #d4b97a;
  --blue: #8ab4c4;
  --red: #c4786a;
  --nav-h: 64px; --header-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh; min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom));
  padding-top: var(--safe-top);
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; top: var(--safe-top);
  z-index: 100; height: var(--header-h);
  background: rgba(8,10,8,.97);
  -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 10px;
}
.logo { display: flex; align-items: center; gap: 8px; flex: 1; }
.logo-jp { font-family: 'Cinzel', serif; font-size: 16px; color: var(--accent); line-height: 1; letter-spacing: 2px; }
.logo-title { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); text-shadow: 0 0 20px rgba(212,185,122,.3); }
.logo-sub { font-size: 8px; color: var(--muted); font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
.header-live { display: flex; align-items: center; gap: 5px; background: rgba(212,185,122,.08); border: 1px solid rgba(212,185,122,.2); border-radius: 2px; padding: 3px 9px; }
.header-live span { font-size: 9px; font-weight: 600; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 200;
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(8,10,8,.97);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(212,185,122,.15);
  display: flex; align-items: flex-start; padding-top: 8px;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; background: none; border: none; cursor: pointer;
  padding: 6px 0; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.nav-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; line-height: 1; transition: transform .15s; color: var(--muted); }
.nav-btn.active .nav-icon { color: var(--accent); }
.nav-label { font-size: 10px; font-weight: 700; color: var(--muted); font-family: inherit; transition: color .15s; }
.nav-btn.active .nav-icon { transform: scale(1.15); }
.nav-btn.active .nav-label { color: var(--accent); }

/* ── MAIN ── */
main { padding: 16px; max-width: 900px; margin: 0 auto; }
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── SECTION HEADER ── */
.section-header { margin-bottom: 14px; }
.section-title { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 3px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
.section-sub { font-size: 11px; color: var(--muted); letter-spacing: .5px; }

/* ── GENRE FILTERS ── */
.genre-scroll {
  display: flex; gap: 7px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 12px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.genre-scroll::-webkit-scrollbar { display: none; }
.genre-pill {
  display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
  border-radius: 2px; padding: 6px 12px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700; color: var(--muted);
  touch-action: manipulation; transition: all .15s;
  white-space: nowrap;
}
.genre-pill.active { background: rgba(212,185,122,.12); border-color: var(--accent); color: var(--accent); }

/* ── POSTER GRID ── */
.poster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
.poster-card {
  position: relative; border-radius: 4px; overflow: hidden;
  aspect-ratio: 2/3; cursor: pointer;
  border: 1px solid rgba(255,255,255,.07);
  transition: transform .2s;
  touch-action: manipulation;
}
.poster-card:active { transform: scale(.96); }
.poster-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.poster-fallback {
  width: 100%; height: 100%; position: absolute; top: 0; left: 0;
  display: flex; align-items: center; justify-content: center; font-size: 36px;
}
.poster-new {
  position: absolute; top: 6px; left: 6px; z-index: 2;
  background: var(--accent); color: #0a0b08;
  font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 20px;
}
.poster-ep {
  position: absolute; top: 6px; right: 6px; z-index: 2;
  background: rgba(0,0,0,.75); color: #fff;
  font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 20px;
  -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
}
.poster-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
  background: linear-gradient(to top, rgba(8,10,8,.97) 0%, transparent 100%);
  padding: 24px 8px 8px;
}
.poster-title-s { font-size: 10px; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 6px; }
.poster-add {
  width: 100%; padding: 5px 0; border-radius: 2px; border: 1px solid rgba(212,185,122,.35); cursor: pointer;
  font-family: inherit; font-size: 10px; font-weight: 600; letter-spacing: .5px;
  background: rgba(212,185,122,.12); color: var(--accent);
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.poster-add.added { background: rgba(143,191,143,.12); color: var(--green); border-color: rgba(143,191,143,.3); }

/* ── ANIME LIST ── */
.anime-list { display: flex; flex-direction: column; gap: 8px; }
.anime-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 3px; overflow: hidden;
}
.anime-card-inner { display: flex; align-items: center; gap: 0; }
.anime-thumb {
  width: 54px; height: 76px; flex-shrink: 0; overflow: hidden; position: relative;
}
.anime-thumb img { width: 100%; height: 100%; object-fit: cover; }
.anime-thumb-icon {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.anime-info { flex: 1; padding: 10px 10px 10px 12px; min-width: 0; }
.anime-name { font-size: 12px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: .3px; }
.anime-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.tag { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 2px; }
.anime-prog { display: flex; align-items: center; gap: 6px; }
.prog-bar { flex: 1; height: 3px; background: rgba(255,255,255,.07); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; }
.prog-txt { font-size: 10px; color: var(--muted); font-weight: 600; flex-shrink: 0; }
.anime-btns { display: flex; align-items: center; gap: 6px; padding: 0 10px; flex-shrink: 0; }
.btn-ep {
  background: rgba(212,185,122,.1); color: var(--accent);
  border: 1px solid rgba(212,185,122,.25); border-radius: 3px;
  padding: 7px 10px; font-family: inherit; font-size: 11px; font-weight: 600;
  cursor: pointer; touch-action: manipulation; white-space: nowrap;
  letter-spacing: .5px;
}
.btn-del {
  background: rgba(196,120,106,.1); color: var(--red);
  border: 1px solid rgba(248,113,113,.2); border-radius: 8px;
  width: 30px; height: 30px; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; touch-action: manipulation; font-family: inherit;
}

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 14px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 12px 8px; text-align: center; }
.stat-val { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; }
.stat-label { font-size: 8px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }

/* ── FILTERS ── */
.filter-bar { display: flex; gap: 7px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-input {
  flex: 1; min-width: 120px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 2px; padding: 9px 12px; color: var(--text);
  font-family: inherit; font-size: 13px; outline: none;
  -webkit-appearance: none;
}
.filter-select {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 2px; padding: 9px 10px; color: var(--text);
  font-family: inherit; font-size: 12px; outline: none; -webkit-appearance: none;
  appearance: none;
}
.filter-input:focus, .filter-select:focus { border-color: var(--accent); }

/* ── ADD FORM ── */
.add-form {
  background: rgba(192,132,252,.05); border: 1px solid rgba(192,132,252,.2);
  border-radius: 3px; padding: 14px; margin-bottom: 12px;
}
.add-form-title { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 10px; letter-spacing: 1.5px; text-transform: uppercase; }
.add-form-fields { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.add-form-row { display: flex; gap: 7px; }
.add-form-row .filter-input { flex: 2; }
.add-form-row .filter-select { flex: 1; }
.add-form-small { display: flex; gap: 7px; }
.add-form-small input { flex: 1; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-d));
  color: #0a0b08; border: none; padding: 10px 18px; border-radius: 2px;
  cursor: pointer; font-family: inherit; font-weight: 700; font-size: 12px;
  touch-action: manipulation; letter-spacing: 1px; text-transform: uppercase;
}
.btn-secondary {
  background: var(--surface); color: var(--muted); border: 1px solid var(--border);
  padding: 9px 14px; border-radius: 2px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700;
  touch-action: manipulation;
}
.btn-primary:disabled { opacity: .5; }

/* ── GENRE CHIPS ── */
.genre-chips-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 12px; margin-bottom: 12px; }
.chips-title { font-family: 'Cinzel', serif; font-size: 9px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
.genre-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.genre-chip {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 10px; border-radius: 2px; cursor: pointer;
  touch-action: manipulation; font-size: 11px; font-weight: 600; color: #64748b;
  border: 1px solid rgba(255,255,255,.07);
}

/* ── EPISODE PANEL ── */
.ep-overlay {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(6,7,13,.92);
  -webkit-backdrop-filter: blur(18px);
  backdrop-filter: blur(18px);
  display: none; align-items: flex-end; justify-content: center;
  padding: 0;
}
.ep-overlay.open { display: flex; }
.ep-panel {
  width: 100%; max-width: 680px; max-height: 92dvh;
  background: #0a0b08; border-radius: 4px 4px 0 0; border-top: 1px solid rgba(212,185,122,.2);
  overflow: hidden; display: flex; flex-direction: column;
  padding-bottom: var(--safe-bottom);
}
.ep-drag { width: 36px; height: 4px; background: rgba(255,255,255,.15); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
.ep-header { position: relative; flex-shrink: 0; }
.ep-header-bg { position: absolute; inset: 0; overflow: hidden; }
.ep-header-bg img { width: 100%; height: 100%; object-fit: cover; opacity: .07; filter: blur(8px); transform: scale(1.1); }
.ep-header-inner { position: relative; padding: 14px 16px 0; display: flex; gap: 12px; align-items: flex-start; }
.ep-poster { width: 58px; height: 82px; border-radius: 3px; overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 16px rgba(0,0,0,.8); }
.ep-poster img { width: 100%; height: 100%; object-fit: cover; }
.ep-info-block { flex: 1; min-width: 0; }
.ep-title { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 6px; color: var(--accent); letter-spacing: 1px; }
.ep-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.ep-prog { height: 4px; background: rgba(255,255,255,.08); border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
.ep-prog-fill { height: 100%; border-radius: 4px; transition: width .4s; }
.ep-prog-txt { font-size: 11px; color: #475569; }
.ep-close { background: rgba(255,255,255,.08); border: none; color: #64748b; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 13px; font-family: inherit; flex-shrink: 0; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
.ep-note-row { position: relative; padding: 10px 16px 14px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.ep-note-btn { width: 24px; height: 24px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; font-size: 10px; font-weight: 700; touch-action: manipulation; }
.ep-body { overflow-y: auto; flex: 1; padding: 12px 14px 6px; -webkit-overflow-scrolling: touch; }
.ep-count-label { font-size: 10px; color: #475569; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 7px; }
.ep-btn {
  position: relative; padding: 10px 6px; border-radius: 3px;
  cursor: pointer; font-family: inherit; display: flex; flex-direction: column;
  align-items: center; gap: 5px; touch-action: manipulation;
  border: 2px solid rgba(255,255,255,.07); background: rgba(255,255,255,.025);
}
.ep-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,.1); display: flex; align-items: center; justify-content: center; font-size: 13px; }
.ep-num { font-size: 11px; font-weight: 700; color: #475569; }
.ep-next-badge { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0a0b08; font-size: 7px; font-weight: 800; padding: 1px 5px; border-radius: 2px; white-space: nowrap; }
.ep-footer { padding: 10px 14px; border-top: 1px solid rgba(255,255,255,.06); display: flex; gap: 7px; background: rgba(0,0,0,.4); flex-shrink: 0; }
.ep-footer button { flex: 1; padding: 11px 0; }

/* ── SUGGESTION ── */
.sug-control { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 16px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.sug-control select { flex: 1; min-width: 140px; }
.sug-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.sug-card { background: var(--surface); border-radius: 3px; overflow: hidden; padding: 13px; border: 1px solid var(--border); }
.sug-top { height: 3px; margin: -13px -13px 11px; }
.sug-title { font-weight: 800; font-size: 13px; line-height: 1.3; margin-bottom: 7px; }
.sug-meta { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 7px; }
.sug-synopsis { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
.sug-why { font-size: 10px; padding: 5px 8px; border-radius: 7px; margin-bottom: 10px; line-height: 1.4; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }

/* ── RANKING ── */
.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 3px;
  font-size: 13px; font-weight: 900; flex-shrink: 0;
  letter-spacing: .5px;
}
.rank-select-big {
  padding: 8px 12px; border-radius: 10px; border: 1px solid;
  font-family: inherit; font-size: 13px; font-weight: 900;
  cursor: pointer; -webkit-appearance: none; appearance: none;
  text-align: center; min-width: 64px;
  outline: none; letter-spacing: .5px;
}
.rank-select {
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px; padding: 5px 8px; color: var(--text);
  font-family: inherit; font-size: 12px; font-weight: 700;
  outline: none; cursor: pointer; -webkit-appearance: none; appearance: none;
}
.rank-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 3px; overflow: hidden; display: flex; align-items: center;
  gap: 0; margin-bottom: 8px; cursor: pointer; transition: border-color .2s;
}
.rank-card:active { opacity: .85; }

/* ── SHIMMER ── */
.shimmer { background: linear-gradient(90deg, rgba(255,255,255,.03) 25%, rgba(212,185,122,.07) 50%, rgba(255,255,255,.03) 75%); background-size: 200% 100%; animation: shim 1.5s infinite; border-radius: 12px; aspect-ratio: 2/3; }
@keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.pulsing { animation: pul 1.4s infinite; }
@keyframes pul { 0%,100%{opacity:.5} 50%{opacity:1} }

a { text-decoration: none; color: inherit; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

/* ── DESKTOP ADJUSTMENTS ── */
@media (min-width: 768px) {
  .bottom-nav { display: none; }
  body { padding-bottom: 0; }
  header { padding: 0 24px; justify-content: space-between; }
  .desktop-nav { display: flex; gap: 1px; background: rgba(212,185,122,.06); padding: 3px; border-radius: 2px; border: 1px solid var(--border); }
  .desktop-nav-btn { background: none; border: none; border-bottom: 1px solid transparent; cursor: pointer; padding: 7px 14px; font-family: 'Cinzel', serif; font-size: 10px; font-weight: 600; color: var(--muted); transition: all .2s; letter-spacing: 1.5px; text-transform: uppercase; }
  .desktop-nav-btn.active { background: rgba(212,185,122,.1); color: var(--accent); border-bottom: 1px solid var(--accent); }
  main { padding: 24px; }
  .poster-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
  .ep-panel { border-radius: 24px; max-height: 88vh; margin: auto; }
  .ep-overlay { align-items: center; padding: 20px; }
  .ep-drag { display: none; }
}
@media (max-width: 767px) {
  .desktop-nav { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
      <polygon points="14,1 27,14 14,27 1,14" stroke="#d4b97a" stroke-width="1" fill="none"/>
      <polygon points="14,6 22,14 14,22 6,14" stroke="#d4b97a" stroke-width=".7" fill="none" opacity=".6"/>
      <polygon points="14,10 18,14 14,18 10,14" fill="#d4b97a" opacity=".9"/>
      <line x1="14" y1="1" x2="14" y2="6" stroke="#d4b97a" stroke-width=".7" opacity=".4"/>
      <line x1="14" y1="22" x2="14" y2="27" stroke="#d4b97a" stroke-width=".7" opacity=".4"/>
      <line x1="1" y1="14" x2="6" y2="14" stroke="#d4b97a" stroke-width=".7" opacity=".4"/>
      <line x1="22" y1="14" x2="27" y2="14" stroke="#d4b97a" stroke-width=".7" opacity=".4"/>
    </svg>
    <div>
      <div class="logo-title">SOLEIL NOIR</div>
      <div class="logo-sub">Animation Library</div>
    </div>
  </div>
  <div class="header-live" id="header-live" style="display:none">
    <div class="live-dot"></div>
    <span id="live-time">Live</span>
  </div>
  <!-- Desktop nav -->
  <nav class="desktop-nav">
    <button class="desktop-nav-btn active" onclick="setTab('nouveautes')">Nouveautés</button>
    <button class="desktop-nav-btn" onclick="setTab('decouverte')">Ranking</button>
    <button class="desktop-nav-btn" onclick="setTab('liste')">Bibliothèque</button>
  </nav>
</header>

<main>

  <!-- NOUVEAUTÉS -->
  <div id="tab-nouveautes" class="tab-content active">
    <div class="section-header">

<script>
const GENRES = {
  isekai:  { label:"Isekai",      icon:`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width=".8"/><circle cx="6.5" cy="6.5" r="2.5" stroke="currentColor" stroke-width=".7" opacity=".6"/><line x1="6.5" y1="1" x2="6.5" y2="3.5" stroke="currentColor" stroke-width=".8"/><line x1="6.5" y1="9.5" x2="6.5" y2="12" stroke="currentColor" stroke-width=".8"/><line x1="1" y1="6.5" x2="3.5" y2="6.5" stroke="currentColor" stroke-width=".8"/><line x1="9.5" y1="6.5" x2="12" y2="6.5" stroke="currentColor" stroke-width=".8"/></svg>`, color:"#c084fc", keys:["isekai","reincarnated","another world","reborn","tensei","slime","farming life","vending machine","beginning after the end","petals of reincarnation"] },
  shonen:  { label:"Shōnen",     icon:`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><polygon points="6.5,1 12,10 1,10" stroke="currentColor" stroke-width=".8" fill="none"/><polygon points="6.5,4 10,10 3,10" fill="currentColor" opacity=".4"/></svg>`, color:"#f87171", keys:["fist","north star","one piece","rooster","kill blue","monster eater","all you need is kill","diamond no ace","jojo","iruma"] },
  seinen:  { label:"Seinen",      icon:`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1.5 6.5 Q6.5 1 11.5 6.5 Q6.5 12 1.5 6.5Z" stroke="currentColor" stroke-width=".8" fill="none"/><circle cx="6.5" cy="6.5" r="2" fill="currentColor" opacity=".7"/></svg>`, color:"#94a3b8", keys:["classroom of the elite","dorohedoro","liar game","drops of god","eren","southpaw","needy girl","mao"] },
  fantasy: { label:"Fantasy",     icon:`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><line x1="2" y1="2" x2="11" y2="11" stroke="currentColor" stroke-width=".9"/><line x1="11" y1="2" x2="2" y2="11" stroke="currentColor" stroke-width=".9"/><circle cx="6.5" cy="6.5" r="1.5" fill="currentColor"/><rect x="5.5" y="0" width="2" height="2" fill="currentColor" opacity=".5"/></svg>`, color:"#fbbf24", keys:["fantasy","adventure","sword","magic","witch","dungeon","sage","grancrest","wistoria","brave","scum","appraiser","stone","release that witch","great sage","ryddel","barbarian","record","daemons","shadow realm","digimon"] },
  romance: { label:"Romance",     icon:`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 10.5 L2 5.5 Q2 2 5 2 Q6.5 3 6.5 4 Q6.5 3 8 2 Q11 2 11 5.5 Z" stroke="currentColor" stroke-width=".8" fill="none"/><path d="M6.5 8 L4 5.5 Q4 4 5.5 4 L6.5 5 L7.5 4 Q9 4 9 5.5 Z" fill="currentColor" opacity=".5"/></svg>`, color:"#f472b6", keys:["romance","love","girl","angel","girlfriend","villainess","marriage","bride","fiancée","koi","klutzy","replica","meter","rent","otonari","botan","observation log","haibara","awajima","food diary","maid","gals","otaku","kirio","kujima","yowayowa","nakamura","always a catch","marika","mistress kanan","pardon","intrusion","classroom of a black cat"] },
  horreur: { label:"Horreur",     icon:`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><polygon points="6.5,1 12,7 10,12 3,12 1,7" stroke="currentColor" stroke-width=".8" fill="none"/><line x1="4" y1="9" x2="9" y2="9" stroke="currentColor" stroke-width=".7" opacity=".5"/><circle cx="4.5" cy="6.5" r="1" fill="currentColor" opacity=".7"/><circle cx="8.5" cy="6.5" r="1" fill="currentColor" opacity=".7"/></svg>`, color:"#818cf8", keys:["horror","thriller","murder","ghost","killed again","detective","beyond twilight","kusunoki","ingoku","deviant","conan","ghost concert"] },
  sport:   { label:"Sport",       icon:`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width=".8"/><line x1="6.5" y1="1" x2="6.5" y2="12" stroke="currentColor" stroke-width=".6" opacity=".4"/><line x1="1" y1="6.5" x2="12" y2="6.5" stroke="currentColor" stroke-width=".6" opacity=".4"/><circle cx="6.5" cy="6.5" r="2" stroke="currentColor" stroke-width=".7"/></svg>`, color:"#34d399", keys:["sport","baseball","diamond","ace","nakamura","always a catch","southpaw","eren"] },
  mecha:   { label:"Mecha/SF",    icon:`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="4" y="1" width="5" height="11" rx="0" stroke="currentColor" stroke-width=".8" fill="none"/><rect x="1" y="4" width="11" height="5" rx="0" stroke="currentColor" stroke-width=".8" fill="none"/><rect x="4" y="4" width="5" height="5" fill="currentColor" opacity=".4"/></svg>`, color:"#22d3ee", keys:["mecha","robot","science","pokemon","snowball earth","nippon sangoku","dr. stone","mission yozakura","ascendance","bookworm","agents","seasons"] },
};
const CS = {"Vu":"#34d399","En cours":"#fbbf24","À voir":"#60a5fa","Abandonné":"#f87171"};
const BACKEND_URL = "https://anitrack-beige.vercel.app/api/anime";

let animes = JSON.parse(localStorage.getItem('anitrack-animes') || 'null') || [
  {id:1,titre:"Re:Zero",genre:"isekai",statut:"Vu",note:9,img:"7tc0j",ahId:"ilp9j",totalEp:25,watched:[]},
  {id:2,titre:"Attack on Titan",genre:"shonen",statut:"Vu",note:10,img:null,ahId:null,totalEp:87,watched:[]},
  {id:3,titre:"That Time I Got Reincarnated as a Slime S4",genre:"isekai",statut:"En cours",note:8,img:"pjoyd",ahId:"aplyf",totalEp:3,watched:[1,2]},
];
let ahData = [];
let ahFilter = "tous";
let currentPanelId = null;

function save() { localStorage.setItem('anitrack-animes', JSON.stringify(animes)); }
function imgUrl(c) { return c ? `https://anitrack-beige.vercel.app/api/anime?img=${c}` : null; }
function pageUrl(id) { return id ? `https://animeheaven.me/anime.php?${id}=` : null; }
function gId(titre) {
  const l = titre.toLowerCase();
  for (const [id,g] of Object.entries(GENRES)) if (g.keys.some(k => l.includes(k))) return id;
  return "fantasy";
}
function isNew(a) { return a.ago && a.ago.includes("h"); }
function getG(id) { return GENRES[id] || GENRES.fantasy; }

// ── TABS ──
// ── LOAD DATA ──
async function loadAH() {
  try {
    const r = await fetch(BACKEND_URL);
    const d = await r.json();
    if (d.animes && d.animes.length > 0) {
      ahData = d.animes;
      const t = d.updatedAt ? new Date(d.updatedAt).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
      document.getElementById('ah-status').innerHTML = `<span style="color:var(--green)">● Live · ${t}</span>`;
      document.getElementById('live-time').textContent = t;
      document.getElementById('header-live').style.display = 'flex';

      // Sync automatique : met à jour le total d'épisodes des animés déjà dans Ma Liste
      let changed = false;
      ahData.forEach(ah => {
        const existing = animes.find(x => x.titre.toLowerCase() === ah.titre.toLowerCase());
        if (existing && ah.ep > existing.totalEp) {
          existing.totalEp = ah.ep;
          changed = true;
        }
      });
      if (changed) save();
    } else {
      document.getElementById('ah-status').textContent = 'Données indisponibles';
    }
  } catch {
    document.getElementById('ah-status').textContent = 'Hors ligne';
  }
  renderGenreFiltersAH();
  renderPosters();
}

// ── GENRE FILTERS ──
function renderGenreFiltersAH() {
  const c = document.getElementById('genre-filters-ah');
  c.innerHTML = '';
  const mk = (label, val) => {
    const b = document.createElement('button');
    b.className = 'genre-pill' + (ahFilter === val || (val === 'tous' && ahFilter === 'tous') ? ' active' : '');
    b.innerHTML = label;
    b.onclick = () => { ahFilter = ahFilter === val ? 'tous' : val; renderGenreFiltersAH(); renderPosters(); };
    c.appendChild(b);
  };
  mk(`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polygon points="6,0 12,6 6,12 0,6" stroke="currentColor" stroke-width=".8" fill="none"/><polygon points="6,3 9,6 6,9 3,6" fill="currentColor" opacity=".7"/></svg> Tous (${ahData.length})`, 'tous', '#d4b97a');
  const todayCount = ahData.filter(a => isNew(a)).length;
  if (todayCount > 0) mk(`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width=".8"/><line x1="6" y1="2" x2="6" y2="6" stroke="currentColor" stroke-width=".9"/><line x1="6" y1="6" x2="9" y2="8" stroke="currentColor" stroke-width=".9"/></svg> Aujourd'hui (${todayCount})`, 'today');
  Object.entries(GENRES).forEach(([id,g]) => {
    const count = ahData.filter(a => gId(a.titre) === id).length;
    if (count > 0) mk(`${g.icon} ${g.label}`, id);
  });
}

// ── RENDER POSTERS ──
function renderPosters() {
  const grid = document.getElementById('poster-grid');
  grid.innerHTML = '';
  const filtered = ahData.filter(a => {
    if (ahFilter === 'today') return isNew(a);
    if (ahFilter !== 'tous') return gId(a.titre) === ahFilter;
    return true;
  });
  document.getElementById('ah-count').textContent = filtered.length ? `· ${filtered.length} animés` : '';
  filtered.forEach(a => {
    const g = getG(gId(a.titre));
    const added = animes.some(x => x.titre.toLowerCase() === a.titre.toLowerCase());
    const url = imgUrl(a.img);
    const div = document.createElement('div');
    div.className = 'poster-card';
    div.onclick = () => {
      if (a.ahId) window.open(pageUrl(a.ahId), '_blank');
      // Ajoute automatiquement à Ma Liste avec tous les épisodes vus
      addFromAH(a, true);
    };
    div.innerHTML = `
      ${url ? `<img src="${url}" alt="${a.titre}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
      <div class="poster-fallback" style="background:linear-gradient(135deg,${g.color}33,#0d0e1a);${url?'display:none':''}">${g.icon}</div>
      ${isNew(a) ? '<div class="poster-new">NEW</div>' : ''}
      <div class="poster-ep">Ep.${a.ep}</div>
      <div class="poster-bottom">
        <div class="poster-title-s">${a.titre}</div>
        <button class="poster-add ${added?'added':''}" onclick="event.stopPropagation();addFromAH(${JSON.stringify(a).replace(/"/g,'&quot;')})">
          ${added ? '✓ Vu' : 'À regarder'}
        </button>
      </div>
    `;
    grid.appendChild(div);
  });
}

function addFromAH(a, allWatched = false) {
  if (typeof a === 'string') a = JSON.parse(a);
  const existing = animes.find(x => x.titre.toLowerCase() === a.titre.toLowerCase());

  // Épisodes à marquer : si allWatched=true (clic carte) → tous y compris le dernier
  // si allWatched=false (bouton "+ Ma liste") → tous sauf le dernier (en cours)
  const watchedUntil = allWatched ? a.ep : a.ep - 1;
  const watched = watchedUntil > 0 ? Array.from({length: watchedUntil}, (_, i) => i + 1) : [];
  const statut = allWatched
    ? (a.ep === watched.length ? "Vu" : "En cours")
    : (a.ep > 1 ? "En cours" : "À voir");

  if (existing) {
    if (a.ep > existing.totalEp) existing.totalEp = a.ep;
    existing.watched = [...new Set([...existing.watched, ...watched])];
    existing.statut = existing.watched.length >= existing.totalEp ? "Vu" : "En cours";
    save(); renderPosters();
    return;
  }

  animes.push({
    id: Date.now(),
    titre: a.titre,
    genre: gId(a.titre),
    statut,
    note: 7,
    img: a.img,
    ahId: a.ahId,
    totalEp: a.ep,
    watched,
  });
  save(); renderPosters();
}

// ── STATS ──
let statutFilter = 'tous';

function setStatutFilter(val) {
  statutFilter = statutFilter === val ? 'tous' : val;
  renderStats();
  renderListe();
}

function renderStats() {
  const vus = animes.filter(a=>a.statut==="Vu").length;
  const enCours = animes.filter(a=>a.statut==="En cours").length;
  const abandonnes = animes.filter(a=>a.statut==="Abandonné").length;
  const stats = [
    {l:"Total",    v:animes.length, c:"#c084fc", key:"tous",      i:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" stroke="currentColor" stroke-width=".9"/><line x1="5" y1="13" x2="11" y2="13" stroke="currentColor" stroke-width=".8"/><line x1="8" y1="13" x2="8" y2="15" stroke="currentColor" stroke-width=".8"/></svg>`},
    {l:"Vus",      v:vus,           c:"#34d399", key:"Vu",        i:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polygon points="8,1 15,8 8,15 1,8" stroke="currentColor" stroke-width=".9" fill="none"/><polyline points="5,8 7,11 11,5" stroke="currentColor" stroke-width="1.2"/></svg>`},
    {l:"En cours", v:enCours,       c:"#fbbf24", key:"En cours",  i:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polygon points="4,2 14,8 4,14" stroke="currentColor" stroke-width=".9" fill="none"/><polygon points="4,4 12,8 4,12" fill="currentColor" opacity=".5"/></svg>`},
    {l:"Abandonné",v:abandonnes,    c:"#c4786a", key:"Abandonné", i:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="1.2"/><line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="1.2"/></svg>`},
  ];
  document.getElementById('stats-grid').innerHTML = stats.map(s => {
    const active = statutFilter === s.key;
    return `<div class="stat-card" onclick="setStatutFilter('${s.key}')" style="cursor:pointer;border-color:${active ? s.c : 'rgba(212,185,130,.12)'};background:${active ? s.c+'18' : 'rgba(212,185,130,.04)'}">
      <div style="width:20px;height:20px;margin:0 auto 4px;color:${s.c}">${s.i}</div>
      <div class="stat-val" style="color:${s.c}">${s.v}</div>
      <div class="stat-label" style="color:${active ? s.c : ''}">${s.l}</div>
    </div>`;
  }).join('');
}

// ── GENRE CHIPS ──
function renderGenreChips() {
  const c = document.getElementById('genre-chips-liste');
  c.innerHTML = Object.entries(GENRES).map(([id,g]) => {
    const count = animes.filter(a=>a.genre===id).length;
    if (!count) return '';
    return `<div class="genre-chip" style="border-color:${g.color}33" onclick="filterByGenre('${id}')">
      <span style="color:${g.color};display:flex;align-items:center;gap:4px">${g.icon} ${g.label}</span>
      <span style="background:rgba(255,255,255,.07);padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700;color:var(--muted)">${count}</span>
    </div>`;
  }).join('');
}

let genreFilter = 'tous';
function filterByGenre(id) {
  genreFilter = genreFilter === id ? 'tous' : id;
  renderListe();
  renderGenreChips();
}

// ── RENDER LISTE ──
function renderListe() {
  renderStats(); renderGenreChips();
  const search = document.getElementById('search-input').value.toLowerCase();
  const filtered = animes.filter(a =>
    (genreFilter==='tous'||a.genre===genreFilter) &&
    (statutFilter==='tous'||a.statut===statutFilter) &&
    a.titre.toLowerCase().includes(search)
  );
  const list = document.getElementById('anime-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="5" y="10" width="30" height="22" stroke="#6b6050" stroke-width="1.2" fill="none"/><polyline points="5,10 20,24 35,10" stroke="#6b6050" stroke-width="1.2" fill="none"/></svg></div><div style="font-weight:700">Aucun animé trouvé</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(a => {
    const g = getG(a.genre);
    const w = a.watched||[];
    const pct = a.totalEp>0 ? Math.round(w.length/a.totalEp*100) : 0;
    const lastW = w.length>0 ? Math.max(...w) : 0;
    const url = imgUrl(a.img);
    return `<div class="anime-card" onclick="openAnimeFromList(${a.id})" style="cursor:pointer">
      <div class="anime-card-inner">
        <div class="anime-thumb">
          ${url?`<img src="${url}" onerror="this.style.display='none'">`:`<div class="anime-thumb-icon" style="background:${g.color}18">${g.icon}</div>`}
        </div>
        <div class="anime-info">
          <div class="anime-name">${a.titre}</div>
          <div class="anime-tags">
            <span class="tag" style="background:${g.color}20;color:${g.color}">${g.label}</span>
            <span class="tag" style="background:${CS[a.statut]}20;color:${CS[a.statut]}">${a.statut}</span>
          </div>
          <div class="anime-prog">
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${g.color}"></div></div>
            <span class="prog-txt">${w.length}/${a.totalEp}</span>
          </div>
        </div>
        <div class="anime-btns">
          <button class="btn-ep" onclick="event.stopPropagation();openPanel(${a.id})">Épisodes</button>
          <button class="btn-del" onclick="event.stopPropagation();abandonAnime(${a.id})" title="Abandonner"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.2"/></svg></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openAnimeFromList(id) {
  const a = animes.find(x => x.id === id);
  if (!a || !a.ahId) return;
  // Ouvre AnimeHeaven
  window.open(pageUrl(a.ahId), '_blank');
  // Marque tous les épisodes comme vus (on considère qu'on vient de regarder le dernier)
  const allWatched = Array.from({length: a.totalEp}, (_, i) => i + 1);
  a.watched = [...new Set([...a.watched, ...allWatched])];
  a.statut = a.watched.length >= a.totalEp ? "Vu" : "En cours";
  save();
  renderListe();
  renderPosters();
}

function abandonAnime(id) {
  const a = animes.find(x => x.id === id);
  if (!a) return;
  if (a.statut === "Abandonné") {
    // Déjà abandonné → supprimer définitivement
    animes = animes.filter(x => x.id !== id);
  } else {
    // Passer en abandonné
    a.statut = "Abandonné";
  }
  save();
  renderListe();
  renderPosters();
  renderArchives();
}

function deleteAnime(id) {
  animes = animes.filter(a => a.id !== id);
  save();
  renderListe();
  renderPosters(); // Sync avec Nouveautés
}

// ── ADD FORM ──
function toggleForm() {
  const f = document.getElementById('add-form');
  const b = document.getElementById('add-btn');
  const open = f.style.display !== 'none';
  f.style.display = open ? 'none' : 'block';
  b.textContent = open ? '＋' : '✕';
}
function addAnime() {
  const titre = document.getElementById('new-titre').value.trim();
  if (!titre) return;
  animes.push({
    id:Date.now(), titre,
    genre:document.getElementById('new-genre').value,
    statut:document.getElementById('new-statut').value,
    note:parseInt(document.getElementById('new-note').value)||7,
    totalEp:parseInt(document.getElementById('new-ep').value)||12,
    img:null, ahId:null, watched:[]
  });
  save(); renderListe();
  document.getElementById('new-titre').value='';
  toggleForm();
}

// ── EPISODE PANEL ──
function openPanel(id) { currentPanelId=id; renderPanel(); document.getElementById('ep-overlay').classList.add('open'); }
function closePanelOutside(e) { if(e.target===document.getElementById('ep-overlay')) document.getElementById('ep-overlay').classList.remove('open'); }

function renderPanel() {
  const a = animes.find(x=>x.id===currentPanelId);
  if(!a) return;
  const g = getG(a.genre);
  const w = a.watched||[];
  const lastW = w.length>0 ? Math.max(...w) : 0;
  const pct = a.totalEp>0 ? Math.round(w.length/a.totalEp*100) : 0;
  const nextEp = lastW<a.totalEp ? lastW+1 : null;
  const url = imgUrl(a.img);

  document.getElementById('ep-panel').style.cssText += `;border-top:2px solid ${g.color}55;`;
  const bgImg = document.getElementById('ep-bg-img');
  if(url){bgImg.src=url;}else bgImg.style.display='none';
  document.getElementById('ep-poster').innerHTML = url
    ? `<img src="${url}" alt="${a.titre}">`
    : `<div style="width:100%;height:100%;background:${g.color}22;display:flex;align-items:center;justify-content:center;font-size:26px">${g.icon}</div>`;

  document.getElementById('ep-info').innerHTML = `
    <div class="ep-title">${a.titre}</div>
    <div class="ep-tags">
      <span class="tag" style="background:${g.color}22;color:${g.color}">${g.icon} ${g.label}</span>
      <span class="tag" style="background:${CS[a.statut]}22;color:${CS[a.statut]}">${a.statut}</span>
    </div>
    <div class="ep-prog"><div class="ep-prog-fill" style="width:${pct}%;background:linear-gradient(90deg,${g.color},${g.color}88)"></div></div>
    <div class="ep-prog-txt">${w.length}/${a.totalEp} épisodes · ${pct}%${nextEp?` · Suivant : Ép.${nextEp}`:''}</div>
  `;

  document.getElementById('ep-note-row').innerHTML = `
    <span style="font-size:10px;color:#64748b;font-weight:700;flex-shrink:0">Rang :</span>
    <div class="rank-badge" style="background:${getRankObj(getRank(a)).bg};color:${getRankObj(getRank(a)).color};${getRankObj(getRank(a)).glow?`box-shadow:0 0 14px ${getRankObj(getRank(a)).color}66`:''}">
      ${getRankObj(getRank(a)).label}
    </div>
    <select class="rank-select" onchange="setRankFromPanel(${a.id}, this.value)" style="border-color:${getRankObj(getRank(a)).color}44">
      ${RANKS.map(r => `<option value="${r.id}" ${getRank(a)===r.id?'selected':''}>${r.label}</option>`).join('')}
    </select>
  `;

  document.getElementById('ep-count-label').textContent = `${a.totalEp} épisodes`;
  const grid = document.getElementById('ep-grid');
  grid.innerHTML = '';
  for(let n=1; n<=a.totalEp; n++) {
    const seen = w.includes(n);
    const isNext = n===nextEp;
    const btn = document.createElement('button');
    btn.className='ep-btn';
    btn.style.border=`2px solid ${seen?g.color:isNext?'rgba(96,165,250,.4)':'rgba(255,255,255,.07)'}`;
    btn.style.background=seen?`${g.color}18`:isNext?'rgba(96,165,250,.08)':'rgba(255,255,255,.025)';
    btn.innerHTML=`
      ${isNext?'<span class="ep-next-badge">SUIV.</span>':''}
      <div class="ep-check" style="background:${seen?g.color:'rgba(255,255,255,.07)'};border-color:${seen?g.color:'rgba(255,255,255,.15)'};color:${seen?'#fff':'#475569'}">${seen?'✓':'○'}</div>
      <span class="ep-num" style="color:${seen?g.color:isNext?'#60a5fa':'#475569'}">Ép.${n}</span>
    `;
    btn.onclick=()=>toggleEp(n);
    grid.appendChild(btn);
  }
}

function toggleEp(n) {
  const a=animes.find(x=>x.id===currentPanelId); if(!a) return;
  const w=a.watched||[];
  a.watched=w.includes(n)?w.filter(x=>x!==n):[...w,n];
  if (a.watched.length === a.totalEp) a.statut = "Vu";
  else if (a.watched.length > 0) a.statut = "En cours";
  // Si abandonné et on recoche un épisode → repasse en cours
  else if (a.statut === "Abandonné") a.statut = "En cours";
  save(); renderPanel();
}
function toggleAllEp(val) {
  const a=animes.find(x=>x.id===currentPanelId); if(!a) return;
  a.watched=val==='all'?Array.from({length:a.totalEp},(_,i)=>i+1):[];
  a.statut=val==='all'?"Vu":"À voir";
  save(); renderPanel();
}
function setRankFromPanel(animeId, rankId) {
  const a = animes.find(x => x.id === animeId);
  if (a) {
    a.rank = rankId;
    save();
    renderPanel();   // Met à jour le panel épisodes
    renderRanking(); // Met à jour le ranking
  }
}

// ── SUGGESTIONS IA ──
async function getSuggestions() {
  const btn=document.getElementById('sug-btn');
  const loading=document.getElementById('sug-loading');
  const grid=document.getElementById('sug-grid');
  const empty=document.getElementById('sug-empty');
  btn.disabled=true; btn.innerHTML='<span class="pulsing">Génération...</span>';
  loading.style.display='grid'; grid.innerHTML=''; empty.style.display='none';
  const sugG=document.getElementById('sug-genre').value;
  const g=getG(sugG);
  const vus=animes.filter(a=>a.statut==="Vu").map(a=>a.titre).join(', ')||'aucun';
  const ahList=ahData.filter(a=>gId(a.titre)===sugG).map(a=>a.titre).slice(0,5).join(', ');
  const prompt=`Tu es un expert anime. Suggère 6 animés du genre "${g.label}" à quelqu'un qui a vu: ${vus}. En cours: ${ahList||'aucun'}. Réponds UNIQUEMENT en JSON sans markdown: [{"titre":"...","annee":2025,"studio":"...","episodes":12,"synopsis":"1-2 phrases","pourquoi":"raison courte","note":8.5}]`;
  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:prompt}]})
    });
    const d=await res.json();
    const raw=d.content?.map(b=>b.text||'').join('')||'[]';
    const sug=JSON.parse(raw.replace(/```json|```/g,'').trim());
    loading.style.display='none';
    grid.innerHTML=sug.map(s=>{
      const added=animes.some(a=>a.titre.toLowerCase()===s.titre?.toLowerCase());
      return `<div class="sug-card" style="border-color:${g.color}33">
        <div class="sug-top" style="background:linear-gradient(90deg,${g.color},transparent)"></div>
        <div class="sug-title">${s.titre}</div>
        <div class="sug-meta">
          ${[s.annee,s.studio,s.episodes?s.episodes+' ep.':null].filter(Boolean).map(x=>`<span class="tag" style="background:rgba(255,255,255,.06);color:#94a3b8">${x}</span>`).join('')}
          ${s.note?`<span style="color:var(--yellow);font-weight:800;font-size:12px">⭐${s.note}</span>`:''}
        </div>
        <p class="sug-synopsis">${s.synopsis}</p>
        ${s.pourquoi?`<div class="sug-why" style="color:${g.color};background:${g.color}11">💡 ${s.pourquoi}</div>`:''}
        <button class="btn-primary" style="width:100%;padding:9px;font-size:12px;${added?'opacity:.5':''}" ${added?'disabled':''} onclick="addFromSug(${JSON.stringify(s).replace(/"/g,'&quot;')})">
          ${added?'✓ Dans ta liste':'+ Ajouter'}
        </button>
      </div>`;
    }).join('');
  } catch {
    loading.style.display='none';
    grid.innerHTML='<div style="color:var(--red);padding:20px">Erreur. Réessaie !</div>';
  }
  btn.disabled=false; btn.textContent='Générer';
}
function addFromSug(s) {
  if(typeof s==='string') s=JSON.parse(s);
  if(animes.some(a=>a.titre.toLowerCase()===s.titre?.toLowerCase())) return;
  animes.push({id:Date.now(),titre:s.titre,genre:document.getElementById('sug-genre').value,statut:"À voir",note:Math.round(s.note)||7,img:null,ahId:null,totalEp:s.episodes||12,watched:[]});
  save();
}

// ── SWIPE TO CLOSE PANEL ──
let touchStartY=0;
document.getElementById('ep-panel').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
document.getElementById('ep-panel').addEventListener('touchmove',e=>{
  const dy=e.touches[0].clientY-touchStartY;
  if(dy>60) document.getElementById('ep-overlay').classList.remove('open');
},{passive:true});

// ── RANKING ──
const RANKS = [
  { id:"norank", label:"No Rank", color:"#6b6050", bg:"rgba(107,96,80,.15)" },
  { id:"E",      label:"E",       color:"#7a7060", bg:"rgba(122,112,96,.15)" },
  { id:"D",      label:"D",       color:"#b8956a", bg:"rgba(184,149,106,.15)" },
  { id:"C",      label:"C",       color:"#8fbf8f", bg:"rgba(143,191,143,.15)" },
  { id:"B",      label:"B",       color:"#8ab4c4", bg:"rgba(138,180,196,.15)" },
  { id:"A",      label:"A",       color:"#c4786a", bg:"rgba(196,120,106,.15)" },
  { id:"S",      label:"S",       color:"#c4a0d4", bg:"rgba(196,160,212,.15)" },
  { id:"S+",     label:"S+",      color:"#d4b97a", bg:"rgba(212,185,122,.18)", glow:true },
];

// Ordre d'affichage : du plus élevé au plus faible
const RANK_DISPLAY_ORDER = ["S+","S","A","B","C","D","E","norank"];

let rankFilter = "tous";
function getRank(a) {
  const r = a.rank || "norank";
  // Fallback : si le rang n'existe plus dans RANKS, on repasse à norank
  return RANKS.find(x => x.id === r) ? r : "norank";
}
function getRankObj(id) { return RANKS.find(r => r.id === id) || RANKS[0]; }

function setRank(animeId, rankId) {
  const a = animes.find(x => x.id === animeId);
  if (a) {
    a.rank = rankId;
    save();
    renderRanking();
    // Si le panel épisodes est ouvert sur cet animé, on le rafraîchit aussi
    if (currentPanelId === animeId) renderPanel();
  }
}

function renderRankFilters() {
  const c = document.getElementById('rank-filters');
  c.innerHTML = '';
  const mk = (label, val, color) => {
    const b = document.createElement('button');
    const isActive = rankFilter === val;
    b.className = 'genre-pill' + (isActive ? ' active' : '');
    b.innerHTML = label;
    if (color) {
      b.style.borderColor = isActive ? color : color + '44';
      b.style.color = isActive ? color : color + 'aa';
      if (isActive) b.style.background = color + '20';
    }
    b.onclick = () => { rankFilter = rankFilter === val ? 'tous' : val; renderRankFilters(); renderRanking(); };
    c.appendChild(b);
  };
  mk(`Tous (${animes.length})`, 'tous', '#94a3b8');
  RANK_DISPLAY_ORDER.forEach(id => {
    const r = getRankObj(id);
    const count = animes.filter(a => getRank(a) === id).length;
    if (count > 0) mk(`${r.label} (${count})`, id, r.color);
  });
}

function renderRanking() {
  renderRankFilters();
  const filtered = rankFilter === 'tous'
    ? [...animes].sort((a,b) => RANK_DISPLAY_ORDER.indexOf(getRank(a)) - RANK_DISPLAY_ORDER.indexOf(getRank(b)))
    : animes.filter(a => getRank(a) === rankFilter);

  const list = document.getElementById('ranking-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 40 40" fill="none"><polygon points="20,2 38,20 20,38 2,20" stroke="#6b6050" stroke-width="1.2" fill="none"/><polygon points="20,10 30,20 20,30 10,20" stroke="#6b6050" stroke-width="1" fill="none" opacity=".5"/><polygon points="20,16 24,20 20,24 16,20" fill="#6b6050"/></svg></div><div style="font-weight:700">Aucun animé dans ta bibliothèque</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(a => {
    const g = getG(a.genre);
    const rank = getRankObj(getRank(a));
    const url = imgUrl(a.img);
    const w = a.watched || [];
    const pct = a.totalEp > 0 ? Math.round(w.length / a.totalEp * 100) : 0;
    return `<div class="rank-card" style="border-color:${rank.color}44" onclick="openAnimeFromList(${a.id})">
      <div class="anime-thumb">
        ${url ? `<img src="${url}" onerror="this.style.display='none'">` : `<div class="anime-thumb-icon" style="background:${g.color}18">${g.icon}</div>`}
      </div>
      <div style="flex:1;padding:10px 12px;min-width:0">
        <div class="anime-name">${a.titre}</div>
        <div style="display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap">
          <span class="tag" style="background:${g.color}18;color:${g.color}">${g.label}</span>
          <span class="tag" style="background:${CS[a.statut]}18;color:${CS[a.statut]}">${a.statut}</span>
        </div>
        <div class="anime-prog">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${g.color}"></div></div>
          <span class="prog-txt">${w.length}/${a.totalEp}</span>
        </div>
      </div>
      <div style="padding:0 12px;flex-shrink:0" onclick="event.stopPropagation()">
        <select class="rank-select-big" onchange="setRank(${a.id},this.value)" style="background:${rank.bg};color:${rank.color};border-color:${rank.color}55;${rank.glow?`box-shadow:0 0 14px ${rank.color}44`:''}">
          ${RANKS.map(r => `<option value="${r.id}" ${getRank(a)===r.id?'selected':''}>${r.label}</option>`).join('')}
        </select>
      </div>
    </div>`;
  }).join('');
}

// Render ranking when tab opens
function setTab(t) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.desktop-nav-btn').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.querySelectorAll('.desktop-nav-btn')[['nouveautes','decouverte','liste'].indexOf(t)]?.classList.add('active');
  document.querySelector(`.nav-btn[data-tab="${t}"]`)?.classList.add('active');
  if (t === 'liste') { renderStats(); renderGenreChips(); renderListe(); }
  if (t === 'decouverte') renderRanking();
}

loadAH();
